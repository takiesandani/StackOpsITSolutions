# cloudbuild.yaml
steps:
  # 1. Build the Docker image and tag it using the commit SHA
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/stackops-backend-475222/stackops-repo/stackops-app:$COMMIT_SHA',
      '.'
    ]

  # 2. Push the newly tagged image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'us-central1-docker.pkg.dev/stackops-backend-475222/stackops-repo/stackops-app:$COMMIT_SHA'
    ]

  # 3. Deploy the new image to Cloud Run with proper health check configuration
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run',
      'deploy',
      'stackops-backend',
      '--image', 'us-central1-docker.pkg.dev/stackops-backend-475222/stackops-repo/stackops-app:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--timeout', '3600s',
      '--max-instances', '10',
      '--memory', '512Mi',
      '--cpu', '1',
      '--set-cloudsql-instances', 'stackops-backend-475222:us-central1:stackops-db',
      '--quiet'
    ]

timeout: '1600s'

images:
  - 'us-central1-docker.pkg.dev/stackops-backend-475222/stackops-repo/stackops-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY