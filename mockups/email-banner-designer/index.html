<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackCTRL Email Banner Designer</title>
  <style>
    :root {
      --page-bg: #eef2f7;
      --ink: #17202a;
      --muted: #64748b;
      --panel: #ffffff;
      --line: #d8e0ea;
      --charcoal: #111820;
      --accent: #ff6b00;
      --blue: #0f62fe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      min-height: 38px;
      border: 1px solid #bfd2ea;
      border-radius: 29px;
      background: #ffffff;
      color: #17324d;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .workspace,
    .controls,
    .code-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
    }

    .workspace {
      padding: 24px;
      overflow: auto;
    }

    .email-frame {
      width: 680px;
      max-width: 100%;
      margin: 0 auto;
      padding: 22px;
      background: #f7f9fc;
      border: 1px solid #dde6f1;
    }

    .preview-host {
      width: 100%;
    }

    .controls {
      padding: 18px;
    }

    .control-group + .control-group {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .group-title {
      margin: 0 0 12px 0;
      font-size: 13px;
      color: #334155;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin: 0 0 12px 0;
      font-size: 13px;
      color: #334155;
      font-weight: 700;
    }

    input[type="text"],
    input[type="url"],
    input[type="number"] {
      display: block;
      width: 100%;
      min-height: 38px;
      margin-top: 6px;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      color: #0f172a;
      background: #ffffff;
    }

    input[type="range"] {
      display: block;
      width: 100%;
      margin-top: 9px;
      accent-color: var(--blue);
    }

    input[type="color"] {
      width: 100%;
      height: 38px;
      margin-top: 6px;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      background: #ffffff;
      padding: 4px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .code-panel {
      margin-top: 18px;
      padding: 18px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: 1px solid #c8d6e5;
      border-radius: 6px;
      padding: 12px;
      color: #dbeafe;
      background: #0f172a;
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .status {
      min-height: 20px;
      margin-top: 8px;
      color: #0f766e;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <h1 class="title">StackCTRL Email Banner Designer</h1>
      <div class="actions">
        <button id="resetButton" type="button">Reset</button>
        <button id="copyButton" type="button" class="primary">Copy Email Code</button>
      </div>
    </div>

    <section class="layout">
      <div>
        <div class="workspace">
          <div class="email-frame">
            <div id="preview" class="preview-host"></div>
          </div>
        </div>

        <div class="code-panel">
          <textarea id="codeOutput" spellcheck="false"></textarea>
          <div id="status" class="status" aria-live="polite"></div>
        </div>
      </div>

      <aside class="controls">
        <div class="control-group">
          <p class="group-title">Content</p>
          <label>
            Logo URL
            <input id="logoUrl" type="url" value="https://i.postimg.cc/NjqZp4bp/Ctrl-big.png">
          </label>
          <label>
            Heading
            <input id="headingText" type="text" value="StackCTRL is locked for your protection">
          </label>
          <label>
            Detail
            <input id="detailText" type="text" value="Use the verification code below to unlock your client portal session.">
          </label>
        </div>

        <div class="control-group">
          <p class="group-title">Layout</p>
          <label>
            Logo width
            <input id="logoWidth" type="range" min="150" max="280" value="210">
          </label>
          <label>
            Lock size
            <input id="lockSize" type="range" min="74" max="150" value="116">
          </label>
          <label>
            Gap
            <input id="gap" type="range" min="0" max="36" value="12">
          </label>
          <div class="two">
            <label>
              Logo X
              <input id="logoX" type="range" min="-90" max="90" value="0">
            </label>
            <label>
              Logo Y
              <input id="logoY" type="range" min="-40" max="40" value="0">
            </label>
          </div>
          <div class="two">
            <label>
              Lock X
              <input id="lockX" type="range" min="-140" max="90" value="0">
            </label>
            <label>
              Lock Y
              <input id="lockY" type="range" min="-40" max="40" value="0">
            </label>
          </div>
          <label>
            Banner padding
            <input id="bannerPadding" type="range" min="18" max="46" value="28">
          </label>
        </div>

        <div class="control-group">
          <p class="group-title">Padlock</p>
          <div class="two">
            <label>
              Stroke
              <input id="lockStroke" type="range" min="2" max="7" value="4">
            </label>
            <label>
              Radius
              <input id="lockRadius" type="range" min="4" max="18" value="12">
            </label>
          </div>
          <div class="two">
            <label>
              Entry position
              <input id="openingTop" type="range" min="0" max="60" value="16">
            </label>
            <label>
              Entry height
              <input id="openingHeight" type="range" min="0" max="64" value="0">
            </label>
          </div>
          <label>
            Orange
            <input id="accentColor" type="color" value="#ff6b00">
          </label>
        </div>

        <div class="control-group">
          <p class="group-title">Banner</p>
          <div class="two">
            <label>
              Background
              <input id="backgroundColor" type="color" value="#111820">
            </label>
            <label>
              Border
              <input id="borderColor" type="color" value="#4b2c1e">
            </label>
          </div>
          <label>
            Corner radius
            <input id="panelRadius" type="range" min="0" max="16" value="8">
          </label>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const controls = {
      logoUrl: document.getElementById('logoUrl'),
      headingText: document.getElementById('headingText'),
      detailText: document.getElementById('detailText'),
      logoWidth: document.getElementById('logoWidth'),
      lockSize: document.getElementById('lockSize'),
      gap: document.getElementById('gap'),
      logoX: document.getElementById('logoX'),
      logoY: document.getElementById('logoY'),
      lockX: document.getElementById('lockX'),
      lockY: document.getElementById('lockY'),
      bannerPadding: document.getElementById('bannerPadding'),
      lockStroke: document.getElementById('lockStroke'),
      lockRadius: document.getElementById('lockRadius'),
      openingTop: document.getElementById('openingTop'),
      openingHeight: document.getElementById('openingHeight'),
      accentColor: document.getElementById('accentColor'),
      backgroundColor: document.getElementById('backgroundColor'),
      borderColor: document.getElementById('borderColor'),
      panelRadius: document.getElementById('panelRadius')
    };

    const defaults = Object.fromEntries(Object.entries(controls).map(([key, input]) => [key, input.value]));
    const preview = document.getElementById('preview');
    const codeOutput = document.getElementById('codeOutput');
    const status = document.getElementById('status');

    function esc(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function px(value) {
      return `${Number(value)}px`;
    }

    function buildPadlock({ size, stroke, radius, accent, background, openingTop, openingHeight }) {
      const bodyWidth = Math.round(size * 0.72);
      const bodyHeight = Math.round(size * 0.5);
      const shackleWidth = Math.round(size * 0.45);
      const shackleHeight = Math.round(size * 0.34);
      const keyDot = Math.max(8, Math.round(size * 0.09));
      const keyStem = Math.max(12, Math.round(size * 0.14));
      const openTop = Math.max(stroke, Math.min(Number(openingTop), bodyHeight - stroke));
      const openHeight = Math.max(0, Math.min(Number(openingHeight), bodyHeight - openTop));
      const coverWidth = stroke + 6;
      const entryCover = openHeight > 0
        ? `<div style="position:absolute; left:${px(-stroke - 2)}; top:${px(openTop)}; width:${px(coverWidth)}; height:${px(openHeight)}; background:${background}; line-height:0; font-size:0;">&nbsp;</div>`
        : '';

      return `
        <div role="img" aria-label="Protected padlock" style="width:${px(size)}; height:${px(size)}; margin:0 auto; text-align:center; line-height:0; font-size:0;">
          <div style="width:${px(shackleWidth)}; height:${px(shackleHeight)}; margin:0 auto; border:${px(stroke)} solid ${accent}; border-bottom:0; border-radius:${px(Math.round(shackleWidth / 2))} ${px(Math.round(shackleWidth / 2))} 0 0; line-height:0; font-size:0;">&nbsp;</div>
          <div style="position:relative; width:${px(bodyWidth)}; height:${px(bodyHeight)}; margin:-1px auto 0 auto; border:${px(stroke)} solid ${accent}; border-radius:${px(radius)}; line-height:0; font-size:0;">
            ${entryCover}
            <div style="width:${px(keyDot)}; height:${px(keyDot)}; margin:${px(Math.round(bodyHeight * 0.24))} auto 0 auto; border:${px(stroke)} solid ${accent}; border-radius:50%; line-height:0; font-size:0;">&nbsp;</div>
            <div style="width:${px(stroke)}; height:${px(keyStem)}; margin:0 auto; background:${accent}; border-radius:${px(stroke)}; line-height:0; font-size:0;">&nbsp;</div>
          </div>
        </div>
      `;
    }

    function buildSnippet() {
      const values = Object.fromEntries(Object.entries(controls).map(([key, input]) => [key, input.value]));
      const lockSize = Number(values.lockSize);
      const logoWidth = Number(values.logoWidth);
      const lockStroke = Number(values.lockStroke);
      const panelRadius = Number(values.panelRadius);
      const bannerPadding = Number(values.bannerPadding);
      const gap = Number(values.gap);
      const lockRadius = Number(values.lockRadius);
      const logoX = Number(values.logoX);
      const logoY = Number(values.logoY);
      const lockX = Number(values.lockX);
      const lockY = Number(values.lockY);
      const padlock = buildPadlock({
        size: lockSize,
        stroke: lockStroke,
        radius: lockRadius,
        accent: values.accentColor,
        background: values.backgroundColor,
        openingTop: Number(values.openingTop),
        openingHeight: Number(values.openingHeight)
      });

      return `
<div style="margin:24px 0; padding:${px(bannerPadding)} 20px ${px(Math.max(22, bannerPadding - 2))} 20px; background:${values.backgroundColor}; border:1px solid ${values.borderColor}; border-radius:${px(panelRadius)}; text-align:center; overflow:hidden; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" align="center" cellspacing="0" cellpadding="0" style="border-collapse:collapse; margin:0 auto 14px auto;">
    <tr>
      <td style="vertical-align:middle; text-align:right; padding:0;">
        <img src="${esc(values.logoUrl)}" alt="StackCTRL" style="position:relative; left:${px(logoX)}; top:${px(logoY)}; display:block; width:${px(logoWidth)}; max-width:${px(logoWidth)}; height:auto; border:0;">
      </td>
      <td style="vertical-align:middle; width:${px(lockSize)}; padding:0 0 0 ${px(gap)};">
        <div style="position:relative; left:${px(lockX)}; top:${px(lockY)};">${padlock.trim()}</div>
      </td>
    </tr>
  </table>
  <div style="color:#f8fafc; font-size:15px; font-weight:700; letter-spacing:0; margin-top:8px;">${esc(values.headingText)}</div>
  <div style="color:#cbd5e1; font-size:12px; margin-top:4px;">${esc(values.detailText)}</div>
</div>`.trim();
    }

    function render() {
      const snippet = buildSnippet();
      preview.innerHTML = snippet;
      codeOutput.value = snippet;
    }

    Object.values(controls).forEach(input => {
      input.addEventListener('input', () => {
        status.textContent = '';
        render();
      });
    });

    document.getElementById('resetButton').addEventListener('click', () => {
      Object.entries(defaults).forEach(([key, value]) => {
        controls[key].value = value;
      });
      status.textContent = '';
      render();
    });

    document.getElementById('copyButton').addEventListener('click', async () => {
      codeOutput.select();
      try {
        await navigator.clipboard.writeText(codeOutput.value);
        status.textContent = 'Copied.';
      } catch (error) {
        document.execCommand('copy');
        status.textContent = 'Selected and copied.';
      }
    });

    render();
  </script>
</body>
</html>
